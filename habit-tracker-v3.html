<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1d1d20;
    --bg4: #232326;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --border3: rgba(255,255,255,0.22);
    --text: #e8e6e0;
    --text2: #8a8880;
    --text3: #4a4845;
    --cell: 44px;
    --gap: 8px;
    --r: 8px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  #app { max-width: 860px; margin: 0 auto; padding: 3rem 2rem 5rem; width: 100%; flex: 1; }

  /* HEADER */
  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 2rem; padding-bottom: 1.5rem;
    border-bottom: 0.5px solid var(--border); gap: 1rem; flex-wrap: wrap;
  }

  .wordmark { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 300; font-size: 28px; letter-spacing: -0.01em; color: var(--text); line-height: 1; }
  .wordmark span { font-style: normal; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.12em; display: block; margin-top: 4px; text-transform: uppercase; }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .hbtn {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 7px 14px; background: transparent; border: 0.5px solid var(--border2);
    color: var(--text2); border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .hbtn:hover { border-color: var(--border3); color: var(--text); }
  .hbtn.active { background: rgba(255,255,255,0.07); color: var(--text); border-color: var(--border3); }

  /* WEEK NAV */
  #week-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 2rem;
    font-size: 11px; color: var(--text2); letter-spacing: 0.06em;
  }
  .nav-btn {
    background: none; border: 0.5px solid var(--border2); color: var(--text2);
    font-family: 'DM Mono', monospace; font-size: 13px; width: 28px; height: 28px;
    border-radius: 5px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--border3); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  #week-range { text-transform: uppercase; }

  /* ADD PANEL */
  #add-panel {
    display: none; background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; animation: slideDown 0.2s ease;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  #add-panel label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }

  #habit-input {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 14px;
    outline: none; margin-bottom: 16px; transition: border-color 0.2s;
  }
  #habit-input:focus { border-color: var(--border3); }
  #habit-input::placeholder { color: var(--text3); }

  .color-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .swatch:hover { transform: scale(1.2); }
  .swatch.sel { border-color: rgba(255,255,255,0.7); transform: scale(1.15); }

  .panel-actions { display: flex; gap: 8px; }
  .panel-actions button {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
    border: 0.5px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .panel-actions button:hover { color: var(--text); border-color: var(--border3); }
  #btn-save { background: rgba(255,255,255,0.07) !important; color: var(--text) !important; }

  /* SETTINGS PANEL */
  #settings-panel {
    display: none; background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; animation: slideDown 0.2s ease;
  }
  .settings-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
  .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 1rem; }
  .setting-label { font-size: 12px; color: var(--text2); }
  .setting-label small { display: block; font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.04em; }

  .seg-btns { display: flex; gap: 4px; }
  .seg-btn {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.05em;
    padding: 5px 10px; border-radius: 5px; cursor: pointer;
    border: 0.5px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .seg-btn.active { background: rgba(255,255,255,0.1); color: var(--text); border-color: var(--border3); }

  .export-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .export-row button {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 6px; cursor: pointer;
    border: 0.5px solid var(--border2); background: transparent; color: var(--text2); transition: all 0.15s;
  }
  .export-row button:hover { color: var(--text); border-color: var(--border3); }

  /* HABIT SECTION */
  .habit-section { margin-bottom: 2.5rem; }
  .habit-meta-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .habit-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .habit-title { font-size: 12px; font-weight: 500; letter-spacing: 0.05em; color: var(--text); text-transform: uppercase; flex: 1; }

  .habit-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; border: 0.5px solid var(--border2); color: var(--text3); }
  .badge.streak { border-color: rgba(255,180,0,0.3); color: rgba(255,180,0,0.7); }
  .badge.perfect { border-color: rgba(100,220,150,0.3); color: rgba(100,220,150,0.7); }

  .btn-remove {
    font-family: 'DM Mono', monospace; font-size: 10px; background: none; border: none;
    color: var(--text3); cursor: pointer; padding: 2px 6px; border-radius: 4px;
    letter-spacing: 0.04em; transition: color 0.15s; opacity: 0;
  }
  .habit-section:hover .btn-remove { opacity: 1; }
  .btn-remove:hover { color: #c0392b; }

  /* HISTORY ROW */
  .history-row { display: flex; gap: var(--gap); flex-wrap: wrap; margin-bottom: 10px; min-height: 0; }

  .week-square {
    width: var(--cell); height: var(--cell); border-radius: var(--r);
    flex-shrink: 0; position: relative; cursor: default; transition: transform 0.2s;
  }
  .week-square:hover { transform: scale(1.1); z-index: 10; }

  .tooltip {
    position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
    background: var(--bg4); border: 0.5px solid var(--border2); border-radius: 6px;
    padding: 6px 10px; font-size: 10px; color: var(--text2); white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; letter-spacing: 0.04em;
  }
  .week-square:hover .tooltip { opacity: 1; }

  /* CURRENT WEEK ROW */
  .current-week-row {
    display: flex; gap: var(--gap); align-items: center;
    padding: 14px 0 6px; border-top: 0.5px solid var(--border); flex-wrap: wrap;
  }

  .day-cell {
    width: var(--cell); height: var(--cell); border-radius: var(--r);
    border: 0.5px solid var(--border2); background: var(--bg3);
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    transition: transform 0.12s, border-color 0.15s, background 0.2s;
    position: relative; flex-shrink: 0;
  }
  .day-cell:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.2); }
  .day-cell.done { border-color: transparent; }
  .day-cell.today { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.25); }
  .day-cell.future { opacity: 0.3; cursor: default; pointer-events: none; }

  .day-letter { font-size: 9px; letter-spacing: 0.06em; color: var(--text3); text-transform: uppercase; line-height: 1; }
  .day-cell.done .day-letter { color: rgba(255,255,255,0.35); }
  .day-num { font-size: 11px; font-weight: 500; color: var(--text2); line-height: 1; }
  .day-cell.done .day-num { color: rgba(255,255,255,0.6); }

  .week-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; margin-left: 4px; white-space: nowrap; }

  /* YEAR VIEW */
  #year-view { display: none; }
  .year-habit { margin-bottom: 2.5rem; }
  .year-habit-title { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .year-grid { display: grid; grid-template-columns: repeat(auto-fill, 32px); gap: 5px; }
  .year-sq {
    width: 32px; height: 32px; border-radius: 5px;
    position: relative; cursor: default; transition: transform 0.15s; border: 0.5px solid transparent;
  }
  .year-sq:hover { transform: scale(1.15); z-index: 10; }
  .year-sq .tooltip { font-size: 9px; }
  .year-sq:hover .tooltip { opacity: 1; }
  .year-sq.current-week { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.3); }
  .year-sq.future-week { opacity: 0.2; }

  /* ANIMATIONS */
  @keyframes popIn {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes fadeCollapse {
    0%   { opacity: 1; transform: scaleY(1); max-height: 80px; }
    40%  { opacity: 0; transform: scaleY(0.6); }
    100% { opacity: 0; transform: scaleY(0); max-height: 0; padding: 0; margin: 0; overflow: hidden; }
  }
  .collapsing { animation: fadeCollapse 0.55s cubic-bezier(0.4,0,0.2,1) forwards; overflow: hidden; }
  .week-square.appearing { animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  /* EMPTY */
  #empty { text-align: center; padding: 4rem 0; color: var(--text3); }
  #empty p:first-child { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; color: var(--text2); margin-bottom: 8px; }
  #empty p:last-child { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* LEGEND */
  #legend { margin-top: 3rem; padding-top: 1.5rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  #legend span { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-right: 6px; }
  .leg-sq { width: 16px; height: 16px; border-radius: 3px; }
  .leg-num { font-size: 9px; color: var(--text3); margin-right: 4px; }

  /* ═══════════════════════════════════════════
     COUNTER SECTION
  ═══════════════════════════════════════════ */
  #counter-section {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 0.5px solid var(--border);
  }

  #counter-section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
  }

  .counter-section-title {
    font-family: 'Playfair Display', serif; font-style: italic; font-weight: 300;
    font-size: 20px; letter-spacing: -0.01em; color: var(--text);
  }
  .counter-section-title span {
    font-style: normal; font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--text3); letter-spacing: 0.12em; display: block; margin-top: 3px; text-transform: uppercase;
  }

  .counter-header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ADD COUNTER PANEL */
  #add-counter-panel {
    display: none; background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; animation: slideDown 0.2s ease;
  }
  #add-counter-panel label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  #counter-input {
    width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 7px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 10px 14px;
    outline: none; margin-bottom: 16px; transition: border-color 0.2s;
  }
  #counter-input:focus { border-color: var(--border3); }
  #counter-input::placeholder { color: var(--text3); }

  /* COUNTER GRID — 1 counter = full width, 2 = split, 3+ = 2-col grid scrolling */
  #counters-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: 1fr;
  }
  #counters-grid.count-2 { grid-template-columns: 1fr 1fr; }
  #counters-grid.count-many { grid-template-columns: 1fr 1fr; }

  /* COUNTER CARD */
  .counter-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 14px;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 220px;
  }

  .counter-card-header {
    display: flex; align-items: center; gap: 8px;
  }
  .counter-card-header .habit-dot { flex-shrink: 0; }
  .counter-card-title { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text); flex: 1; }
  .counter-card-total { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; }

  .counter-view-toggle { display: flex; gap: 4px; }
  .cvt-btn {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px; cursor: pointer;
    border: 0.5px solid var(--border2); background: transparent; color: var(--text3); transition: all 0.15s;
  }
  .cvt-btn.active { background: rgba(255,255,255,0.08); color: var(--text2); border-color: var(--border3); }
  .cvt-btn:hover { color: var(--text2); }

  .btn-remove-counter {
    font-family: 'DM Mono', monospace; font-size: 10px; background: none; border: none;
    color: var(--text3); cursor: pointer; padding: 2px 4px; border-radius: 4px;
    transition: color 0.15s; opacity: 0;
  }
  .counter-card:hover .btn-remove-counter { opacity: 1; }
  .btn-remove-counter:hover { color: #c0392b; }

  /* TODAY'S BIG CLICKER — shown in daily view for current month */
  .counter-clicker-area {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    flex: 1;
  }

  .counter-clicker {
    width: 100px; height: 100px;
    border-radius: 14px;
    border: 0.5px solid var(--border2);
    background: var(--bg3);
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    transition: transform 0.1s, background 0.2s, border-color 0.15s;
    position: relative;
    user-select: none;
  }
  .counter-clicker:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.2); }
  .counter-clicker:active { transform: scale(0.96); }

  .clicker-count {
    font-size: 32px; font-weight: 500; line-height: 1; color: var(--text);
    transition: transform 0.1s;
  }
  .clicker-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); }

  .counter-clicker.has-count { border-color: transparent; }

  .clicker-minus {
    width: 28px; height: 28px; border-radius: 6px;
    border: 0.5px solid var(--border2); background: transparent;
    color: var(--text3); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: 'DM Mono', monospace;
    align-self: center;
  }
  .clicker-minus:hover { color: var(--text); border-color: var(--border3); }

  @keyframes countPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
  .count-pop { animation: countPop 0.2s cubic-bezier(0.34,1.56,0.64,1); }

  /* DAILY SQUARES ROW — current month days */
  .counter-days-row {
    display: flex; gap: 5px; flex-wrap: wrap;
  }

  .cday-sq {
    width: 30px; height: 30px; border-radius: 5px;
    border: 0.5px solid var(--border2); background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; color: var(--text3);
    position: relative; cursor: default; flex-shrink: 0;
    transition: transform 0.15s;
  }
  .cday-sq:hover { transform: scale(1.12); z-index: 5; }
  .cday-sq.has-count { color: var(--text); border-color: transparent; }
  .cday-sq.today-sq { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.2); }
  .cday-sq .tooltip { font-size: 9px; }
  .cday-sq:hover .tooltip { opacity: 1; }

  /* MONTHLY ARCHIVE SQUARES */
  .counter-months-row { display: flex; gap: var(--gap); flex-wrap: wrap; }
  .month-sq {
    width: var(--cell); height: var(--cell); border-radius: var(--r);
    flex-shrink: 0; position: relative; cursor: default;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500; transition: transform 0.2s;
  }
  .month-sq:hover { transform: scale(1.1); z-index: 10; }
  .month-sq:hover .tooltip { opacity: 1; }
  .month-sq-num { line-height: 1; }

  /* WEEKLY ARCHIVE SQUARES (for weekly view) */
  .counter-weeks-row { display: flex; gap: var(--gap); flex-wrap: wrap; }
  .week-cnt-sq {
    width: var(--cell); height: var(--cell); border-radius: var(--r);
    flex-shrink: 0; position: relative; cursor: default;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; transition: transform 0.2s;
    border: 0.5px solid var(--border2); background: var(--bg3);
  }
  .week-cnt-sq:hover { transform: scale(1.1); z-index: 10; }
  .week-cnt-sq:hover .tooltip { opacity: 1; }

  #import-file { display: none; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="wordmark">habit<span>weekly tracker</span></div>
    <div class="header-actions">
      <button class="hbtn" id="btn-view-weekly">weekly</button>
      <button class="hbtn" id="btn-view-year">year</button>
      <button class="hbtn" id="btn-settings">settings</button>
      <button class="hbtn" id="add-btn">+ habit</button>
    </div>
  </header>

  <!-- ADD PANEL -->
  <div id="add-panel">
    <label>Habit name</label>
    <input type="text" id="habit-input" placeholder="e.g. morning run, meditate, read..." autocomplete="off" />
    <label>Color</label>
    <div class="color-row" id="color-row"></div>
    <div class="panel-actions">
      <button id="btn-save">add habit</button>
      <button id="btn-cancel">cancel</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel">
    <div class="settings-title">Settings</div>
    <div class="setting-row">
      <div class="setting-label">Week starts on<small>affects all calendars</small></div>
      <div class="seg-btns">
        <button class="seg-btn" id="start-mon" onclick="setWeekStart('mon')">Mon</button>
        <button class="seg-btn" id="start-sun" onclick="setWeekStart('sun')">Sun</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Completion threshold<small>days/week to count as a streak</small></div>
      <div class="seg-btns" id="threshold-btns"></div>
    </div>
    <div class="setting-row" style="flex-direction:column; align-items:flex-start; gap:10px;">
      <div class="setting-label">Data<small>export or import your habits</small></div>
      <div class="export-row">
        <button onclick="exportData()">export JSON</button>
        <button onclick="document.getElementById('import-file').click()">import JSON</button>
        <input type="file" id="import-file" accept=".json" onchange="importData(event)" />
      </div>
    </div>
  </div>

  <!-- WEEK NAV -->
  <div id="week-nav">
    <button class="nav-btn" id="prev-week" title="Previous week">‹</button>
    <span id="week-range"></span>
    <button class="nav-btn" id="next-week" title="Next week">›</button>
    <button class="hbtn nav-btn" id="today-btn" style="width:auto; padding:4px 10px; font-size:10px;">today</button>
  </div>

  <!-- WEEKLY VIEW -->
  <div id="weekly-view">
    <div id="habits"></div>
    <div id="empty" style="display:none">
      <p>Nothing tracked yet</p>
      <p>Add your first habit above</p>
    </div>
    <div id="legend"></div>
  </div>

  <!-- YEAR VIEW -->
  <div id="year-view">
    <div id="year-habits"></div>
  </div>

  <!-- ═══ COUNTER SECTION ═══ -->
  <div id="counter-section">
    <div id="counter-section-header">
      <div>
        <div class="counter-section-title">counters<span>click to count · monthly totals</span></div>
      </div>
      <div class="counter-header-actions">
        <button class="hbtn" id="add-counter-btn">+ counter</button>
      </div>
    </div>

    <!-- ADD COUNTER PANEL -->
    <div id="add-counter-panel">
      <label>Counter name</label>
      <input type="text" id="counter-input" placeholder="e.g. coffee, pushups, pages read..." autocomplete="off" />
      <label>Color</label>
      <div class="color-row" id="counter-color-row"></div>
      <div class="panel-actions">
        <button id="btn-counter-save">add counter</button>
        <button id="btn-counter-cancel">cancel</button>
      </div>
    </div>

    <div id="counters-grid"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════════════
const PALETTE = [
  { name:'teal',   shades:['#0d2e26','#134033','#195240','#1f6450','#1D9E75','#39b88d','#5dcaa5','#9fe1cb'] },
  { name:'blue',   shades:['#071e38','#0b2d52','#0f3d6e','#12508c','#1a6ab5','#2681d4','#378add','#85b7eb'] },
  { name:'purple', shades:['#18153a','#221d54','#2d266e','#3b3192','#534AB7','#6b62cc','#8a83dc','#b3aeee'] },
  { name:'coral',  shades:['#2e1208','#42190b','#5a220e','#782c12','#993c1d','#b84a25','#d85a30','#f0997b'] },
  { name:'amber',  shades:['#281a05','#3a2507','#4f330b','#6b4510','#8a5b14','#b07519','#d49020','#efb84a'] },
  { name:'pink',   shades:['#2a0e1a','#3d1427','#561c35','#732646','#993556','#b54068','#d4537e','#ed93b1'] },
  { name:'green',  shades:['#101f06','#182e08','#20400b','#2d5710','#3b6d11','#4f8c17','#639922','#97c459'] },
];

// ═══════════════════════════════════════════════════════════
//  STATE / PERSISTENCE
// ═══════════════════════════════════════════════════════════
function loadData() {
  try { return JSON.parse(localStorage.getItem('habitv4') || 'null') || defaultDb(); }
  catch(e) { return defaultDb(); }
}
function defaultDb() {
  return { habits: [], counters: [], settings: { weekStart: 'mon', streakThreshold: 5 } };
}
function saveData() { try { localStorage.setItem('habitv4', JSON.stringify(db)); } catch(e) {} }

let db = loadData();
if (!db.settings) db.settings = { weekStart: 'mon', streakThreshold: 5 };
if (!db.counters) db.counters = [];

let selColor = 0;
let selCounterColor = 1;
let currentView = 'weekly';
let viewingMonday = null;

// ═══════════════════════════════════════════════════════════
//  DATE UTILS
// ═══════════════════════════════════════════════════════════
function toStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr() { return toStr(new Date()); }

function getWeekStart(d) {
  const day = new Date(d);
  day.setHours(0,0,0,0);
  const dow = day.getDay();
  if (db.settings.weekStart === 'mon') {
    const diff = (dow === 0) ? -6 : 1 - dow;
    day.setDate(day.getDate() + diff);
  } else {
    day.setDate(day.getDate() - dow);
  }
  return day;
}

function getWeekDays(monday, count=7) {
  return Array.from({length: count}, (_,i) => {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function addWeeks(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n * 7);
  return d;
}

function weekLabel(monday, short=false) {
  const end = new Date(monday);
  end.setDate(end.getDate() + 6);
  if (short) return monday.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return fmt(monday) + ' – ' + fmt(end);
}

function currentWeekMonday() { return getWeekStart(new Date()); }

function strToDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function monthKey(d) {
  // "YYYY-MM"
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function daysInMonth(year, month) { // month 0-based
  return new Date(year, month+1, 0).getDate();
}

function monthLabel(mk) {
  const [y,m] = mk.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

// ═══════════════════════════════════════════════════════════
//  HABIT UTILS
// ═══════════════════════════════════════════════════════════
function calcStreak(habit) {
  if (!habit.weeks || habit.weeks.length === 0) return 0;
  const threshold = db.settings.streakThreshold;
  const sorted = [...habit.weeks].sort((a,b) => b.monday.localeCompare(a.monday));
  let streak = 0;
  let prevMonday = null;
  for (const w of sorted) {
    if (w.count < threshold) break;
    if (prevMonday) {
      const expected = addWeeks(strToDate(w.monday), 1);
      if (toStr(expected) !== prevMonday) break;
    }
    streak++;
    prevMonday = w.monday;
  }
  return streak;
}

function calcTotalDays(habit) {
  const fromDone = Object.values(habit.done || {}).filter(Boolean).length;
  const fromWeeks = (habit.weeks || []).reduce((s, w) => s + (w.count || 0), 0);
  return fromDone + fromWeeks;
}

function calcPerfectWeeks(habit) {
  return (habit.weeks || []).filter(w => w.count === 7).length;
}

function shadeForCount(colorIdx, count) {
  if (count === 0) return null;
  return PALETTE[colorIdx].shades[count];
}
function midShade(colorIdx) { return PALETTE[colorIdx].shades[4]; }

// ═══════════════════════════════════════════════════════════
//  COUNTER UTILS
// ═══════════════════════════════════════════════════════════
function counterDayCount(counter, dateStr) {
  return (counter.days || {})[dateStr] || 0;
}

function counterMonthTotal(counter, mk) {
  // sum all days in month from counter.days
  const [y, m] = mk.split('-').map(Number);
  const numDays = daysInMonth(y, m-1);
  let total = 0;
  for (let d = 1; d <= numDays; d++) {
    const ds = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    total += (counter.days || {})[ds] || 0;
  }
  // add archived month total if present
  total += (counter.months || {})[mk] || 0;
  return total;
}

function counterWeekTotal(counter, mondayStr) {
  const monday = strToDate(mondayStr);
  const days = getWeekDays(monday);
  return days.reduce((s, d) => s + ((counter.days || {})[toStr(d)] || 0), 0);
}

// shade based on magnitude — we use percentile within this counter's history
function counterShadeForTotal(colorIdx, total, maxTotal) {
  if (total === 0) return null;
  if (maxTotal === 0) return PALETTE[colorIdx].shades[4];
  const ratio = Math.min(total / maxTotal, 1);
  const idx = Math.max(1, Math.round(ratio * 7));
  return PALETTE[colorIdx].shades[idx];
}

function counterTextColor(shade, colorIdx) {
  // light text on dark shades, dark on light shades
  return 'rgba(255,255,255,0.75)';
}

// Check if current month is complete (past the last day)
function isMonthComplete(mk) {
  const today = new Date();
  const [y, m] = mk.split('-').map(Number);
  const current = today.getFullYear()*100 + (today.getMonth()+1);
  const target = y*100 + m;
  return target < current;
}

// Archive past months: move day data into monthly totals
function archiveCounterMonths(counter) {
  if (!counter.days) return;
  const today = new Date();
  const currentMk = monthKey(today);
  const dayKeys = Object.keys(counter.days);
  dayKeys.forEach(ds => {
    const mk = ds.substring(0,7);
    if (mk < currentMk) {
      if (!counter.months) counter.months = {};
      counter.months[mk] = (counter.months[mk] || 0) + (counter.days[ds] || 0);
      delete counter.days[ds];
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  COUNTER RENDER
// ═══════════════════════════════════════════════════════════
function renderCounters() {
  // archive old months first
  db.counters.forEach(c => archiveCounterMonths(c));

  const grid = document.getElementById('counters-grid');
  grid.innerHTML = '';
  grid.className = '';

  const n = db.counters.length;
  if (n === 0) return;
  if (n === 2) grid.classList.add('count-2');
  else if (n >= 3) grid.classList.add('count-many');

  db.counters.forEach(counter => {
    grid.appendChild(buildCounterCard(counter));
  });
}

function buildCounterCard(counter) {
  if (!counter.view) counter.view = 'daily';

  const card = document.createElement('div');
  card.className = 'counter-card';
  card.id = 'counter-' + counter.id;

  // ── Header ──
  const header = document.createElement('div');
  header.className = 'counter-card-header';

  const dot = document.createElement('div');
  dot.className = 'habit-dot';
  dot.style.background = midShade(counter.colorIdx);

  const title = document.createElement('div');
  title.className = 'counter-card-title';
  title.textContent = counter.name;

  // grand total
  const allDays = Object.values(counter.days || {}).reduce((s,v)=>s+v,0);
  const allMonths = Object.values(counter.months || {}).reduce((s,v)=>s+v,0);
  const grandTotal = allDays + allMonths;
  const totalBadge = document.createElement('div');
  totalBadge.className = 'counter-card-total';
  totalBadge.textContent = grandTotal + ' total';

  // view toggle
  const toggle = document.createElement('div');
  toggle.className = 'counter-view-toggle';
  ['daily','weekly'].forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'cvt-btn' + (counter.view === v ? ' active' : '');
    btn.textContent = v;
    btn.onclick = () => {
      counter.view = v;
      saveData();
      const c = document.getElementById('counter-' + counter.id);
      if (c) c.replaceWith(buildCounterCard(counter));
    };
    toggle.appendChild(btn);
  });

  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn-remove-counter';
  removeBtn.textContent = 'remove';
  removeBtn.onclick = () => {
    if (!confirm('Remove "' + counter.name + '"? All data will be lost.')) return;
    db.counters = db.counters.filter(c => c.id !== counter.id);
    saveData();
    renderCounters();
  };

  header.append(dot, title, totalBadge, toggle, removeBtn);
  card.appendChild(header);

  // ── Body ──
  if (counter.view === 'daily') {
    buildDailyView(card, counter);
  } else {
    buildWeeklyView(card, counter);
  }

  return card;
}

function buildDailyView(card, counter) {
  const today = todayStr();
  const now = new Date();
  const currentMk = monthKey(now);

  // Monthly archive squares (past months)
  const archivedMonths = Object.keys(counter.months || {}).sort();
  if (archivedMonths.length > 0) {
    const maxVal = Math.max(...archivedMonths.map(mk => counter.months[mk]));
    const row = document.createElement('div');
    row.className = 'counter-months-row';
    archivedMonths.forEach(mk => {
      const total = counter.months[mk];
      const shade = counterShadeForTotal(counter.colorIdx, total, maxVal);
      const sq = document.createElement('div');
      sq.className = 'month-sq';
      sq.style.background = shade || 'var(--bg3)';
      if (!shade) sq.style.border = '0.5px solid var(--border2)';

      const numEl = document.createElement('div');
      numEl.className = 'month-sq-num';
      numEl.style.color = shade ? 'rgba(255,255,255,0.8)' : 'var(--text3)';
      numEl.style.fontSize = total >= 1000 ? '9px' : total >= 100 ? '11px' : '13px';
      numEl.textContent = total;

      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = monthLabel(mk) + '  ·  ' + total;

      sq.append(numEl, tip);
      row.appendChild(sq);
    });
    card.appendChild(row);
  }

  // Current month: big clicker for today + small day squares
  const clickerArea = document.createElement('div');
  clickerArea.className = 'counter-clicker-area';

  const todayCount = counterDayCount(counter, today);

  // minus button
  const minusBtn = document.createElement('button');
  minusBtn.className = 'clicker-minus';
  minusBtn.textContent = '−';
  minusBtn.title = 'subtract one';
  minusBtn.onclick = () => {
    if (!counter.days) counter.days = {};
    if ((counter.days[today] || 0) > 0) {
      counter.days[today]--;
      if (counter.days[today] === 0) delete counter.days[today];
      saveData();
      const c = document.getElementById('counter-' + counter.id);
      if (c) c.replaceWith(buildCounterCard(counter));
    }
  };

  // big clicker
  const clicker = document.createElement('div');
  clicker.className = 'counter-clicker' + (todayCount > 0 ? ' has-count' : '');
  if (todayCount > 0) {
    const shades = PALETTE[counter.colorIdx].shades;
    const shade = shades[Math.min(todayCount, 7)];
    clicker.style.background = shade;
    clicker.style.borderColor = 'transparent';
  }

  const countEl = document.createElement('div');
  countEl.className = 'clicker-count';
  countEl.textContent = todayCount;
  if (todayCount > 0) countEl.style.color = 'rgba(255,255,255,0.9)';

  const lbl = document.createElement('div');
  lbl.className = 'clicker-label';
  lbl.textContent = 'today';
  if (todayCount > 0) lbl.style.color = 'rgba(255,255,255,0.4)';

  clicker.append(countEl, lbl);
  clicker.onclick = () => {
    if (!counter.days) counter.days = {};
    counter.days[today] = (counter.days[today] || 0) + 1;
    saveData();
    // pop animation
    countEl.classList.remove('count-pop');
    void countEl.offsetWidth;
    countEl.classList.add('count-pop');
    // rebuild card
    const c = document.getElementById('counter-' + counter.id);
    if (c) c.replaceWith(buildCounterCard(counter));
  };

  clickerArea.append(minusBtn, clicker);
  card.appendChild(clickerArea);

  // Current month day squares (all days so far excl today shown separately)
  const [y, m] = currentMk.split('-').map(Number);
  const numDays = daysInMonth(y, m-1);
  const daysRow = document.createElement('div');
  daysRow.className = 'counter-days-row';

  const maxDayCount = Math.max(1, ...Array.from({length:numDays},(_,i)=>{
    const ds = y+'-'+String(m).padStart(2,'0')+'-'+String(i+1).padStart(2,'0');
    return (counter.days||{})[ds]||0;
  }));

  for (let d = 1; d <= numDays; d++) {
    const ds = y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cnt = (counter.days||{})[ds]||0;
    const isToday = ds === today;
    const isFuture = ds > today;

    const sq = document.createElement('div');
    sq.className = 'cday-sq' + (cnt > 0 ? ' has-count' : '') + (isToday ? ' today-sq' : '');

    if (isFuture) { sq.style.opacity = '0.2'; }
    else if (cnt > 0) {
      const shade = counterShadeForTotal(counter.colorIdx, cnt, maxDayCount);
      if (shade) { sq.style.background = shade; sq.style.borderColor = 'transparent'; }
    }

    sq.textContent = cnt > 0 ? cnt : '';

    const tip = document.createElement('div');
    tip.className = 'tooltip';
    const dayDate = new Date(y, m-1, d);
    tip.textContent = dayDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + (cnt > 0 ? '  ·  ' + cnt : '');
    sq.appendChild(tip);

    daysRow.appendChild(sq);
  }
  card.appendChild(daysRow);
}

function buildWeeklyView(card, counter) {
  const now = new Date();
  const currentMk = monthKey(now);

  // Monthly archive squares
  const archivedMonths = Object.keys(counter.months || {}).sort();
  if (archivedMonths.length > 0) {
    const maxVal = Math.max(...archivedMonths.map(mk => counter.months[mk]));
    const row = document.createElement('div');
    row.className = 'counter-months-row';
    archivedMonths.forEach(mk => {
      const total = counter.months[mk];
      const shade = counterShadeForTotal(counter.colorIdx, total, maxVal);
      const sq = document.createElement('div');
      sq.className = 'month-sq';
      sq.style.background = shade || 'var(--bg3)';
      if (!shade) sq.style.border = '0.5px solid var(--border2)';

      const numEl = document.createElement('div');
      numEl.className = 'month-sq-num';
      numEl.style.color = shade ? 'rgba(255,255,255,0.8)' : 'var(--text3)';
      numEl.style.fontSize = total >= 1000 ? '9px' : total >= 100 ? '11px' : '13px';
      numEl.textContent = total;

      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = monthLabel(mk) + '  ·  ' + total;
      sq.append(numEl, tip);
      row.appendChild(sq);
    });
    card.appendChild(row);
  }

  // Current month: today's clicker
  const today = todayStr();
  const todayCount = counterDayCount(counter, today);

  const clickerArea = document.createElement('div');
  clickerArea.className = 'counter-clicker-area';

  const minusBtn = document.createElement('button');
  minusBtn.className = 'clicker-minus';
  minusBtn.textContent = '−';
  minusBtn.onclick = () => {
    if (!counter.days) counter.days = {};
    if ((counter.days[today] || 0) > 0) {
      counter.days[today]--;
      if (counter.days[today] === 0) delete counter.days[today];
      saveData();
      const c = document.getElementById('counter-' + counter.id);
      if (c) c.replaceWith(buildCounterCard(counter));
    }
  };

  const clicker = document.createElement('div');
  clicker.className = 'counter-clicker' + (todayCount > 0 ? ' has-count' : '');
  if (todayCount > 0) {
    const shades = PALETTE[counter.colorIdx].shades;
    clicker.style.background = shades[Math.min(todayCount, 7)];
    clicker.style.borderColor = 'transparent';
  }

  const countEl = document.createElement('div');
  countEl.className = 'clicker-count';
  countEl.textContent = todayCount;
  if (todayCount > 0) countEl.style.color = 'rgba(255,255,255,0.9)';

  const lbl = document.createElement('div');
  lbl.className = 'clicker-label';
  lbl.textContent = 'today';
  if (todayCount > 0) lbl.style.color = 'rgba(255,255,255,0.4)';

  clicker.append(countEl, lbl);
  clicker.onclick = () => {
    if (!counter.days) counter.days = {};
    counter.days[today] = (counter.days[today] || 0) + 1;
    saveData();
    countEl.classList.remove('count-pop');
    void countEl.offsetWidth;
    countEl.classList.add('count-pop');
    const c = document.getElementById('counter-' + counter.id);
    if (c) c.replaceWith(buildCounterCard(counter));
  };

  clickerArea.append(minusBtn, clicker);
  card.appendChild(clickerArea);

  // Weekly totals for current month
  // Find all weeks overlapping with current month
  const [y, m] = currentMk.split('-').map(Number);
  const firstDay = new Date(y, m-1, 1);
  const lastDay = new Date(y, m, 0);

  // collect week starts that overlap this month
  const weeks = [];
  let wk = getWeekStart(firstDay);
  while (wk <= lastDay) {
    weeks.push(new Date(wk));
    wk = addWeeks(wk, 1);
  }

  const weekTotals = weeks.map(mon => counterWeekTotal(counter, toStr(mon)));
  const maxWk = Math.max(1, ...weekTotals);

  const weeksRow = document.createElement('div');
  weeksRow.className = 'counter-weeks-row';

  weeks.forEach((mon, i) => {
    const total = weekTotals[i];
    const isCurrentWeek = toStr(mon) === toStr(currentWeekMonday());
    const shade = counterShadeForTotal(counter.colorIdx, total, maxWk);

    const sq = document.createElement('div');
    sq.className = 'week-cnt-sq';
    if (shade) { sq.style.background = shade; sq.style.borderColor = 'transparent'; }
    if (isCurrentWeek) sq.style.boxShadow = '0 0 0 1.5px rgba(255,255,255,0.25)';

    const numEl = document.createElement('div');
    numEl.style.color = shade ? 'rgba(255,255,255,0.8)' : 'var(--text3)';
    numEl.style.fontSize = total >= 1000 ? '9px' : '11px';
    numEl.textContent = total > 0 ? total : '';

    const tip = document.createElement('div');
    tip.className = 'tooltip';
    tip.textContent = weekLabel(mon) + '  ·  ' + total;

    sq.append(numEl, tip);
    weeksRow.appendChild(sq);
  });

  card.appendChild(weeksRow);
}

// ═══════════════════════════════════════════════════════════
//  HABIT WEEKLY VIEW
// ═══════════════════════════════════════════════════════════
function renderWeekly() {
  document.getElementById('weekly-view').style.display = '';
  document.getElementById('year-view').style.display = 'none';
  document.getElementById('week-nav').style.display = 'flex';

  const monday = viewingMonday || currentWeekMonday();
  const nowMonday = currentWeekMonday();
  const mondayStr = toStr(monday);
  const weekDays = getWeekDays(monday);
  const today = todayStr();
  const isCurrentWeek = mondayStr === toStr(nowMonday);

  document.getElementById('week-range').textContent = weekLabel(monday).toUpperCase();
  document.getElementById('next-week').disabled = isCurrentWeek;
  document.getElementById('today-btn').style.display = isCurrentWeek ? 'none' : '';

  const container = document.getElementById('habits');
  const empty = document.getElementById('empty');
  container.innerHTML = '';

  if (db.habits.length === 0) {
    empty.style.display = 'block';
    document.getElementById('legend').style.display = 'none';
    renderCounters();
    return;
  }
  empty.style.display = 'none';
  document.getElementById('legend').style.display = 'flex';

  const DAY_LABELS = db.settings.weekStart === 'mon'
    ? ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
    : ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  db.habits.forEach(habit => {
    const section = document.createElement('div');
    section.className = 'habit-section';
    section.id = 'habit-' + habit.id;

    const metaRow = document.createElement('div');
    metaRow.className = 'habit-meta-row';

    const dot = document.createElement('div');
    dot.className = 'habit-dot';
    dot.style.background = midShade(habit.colorIdx);

    const title = document.createElement('div');
    title.className = 'habit-title';
    title.textContent = habit.name;

    const badges = document.createElement('div');
    badges.className = 'habit-badges';

    const streak = calcStreak(habit);
    if (streak > 0) {
      const sb = document.createElement('div');
      sb.className = 'badge streak';
      sb.textContent = streak + 'w streak';
      sb.title = streak + ' consecutive weeks ≥' + db.settings.streakThreshold + '/7';
      badges.appendChild(sb);
    }

    const perfects = calcPerfectWeeks(habit);
    if (perfects > 0) {
      const pb = document.createElement('div');
      pb.className = 'badge perfect';
      pb.textContent = perfects + ' perfect';
      badges.appendChild(pb);
    }

    const totalDays = calcTotalDays(habit);
    const db2 = document.createElement('div');
    db2.className = 'badge';
    db2.textContent = totalDays + 'd total';
    badges.appendChild(db2);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'btn-remove';
    removeBtn.textContent = 'remove';
    removeBtn.onclick = () => {
      if (!confirm('Remove "' + habit.name + '"? All data will be lost.')) return;
      db.habits = db.habits.filter(h => h.id !== habit.id);
      saveData();
      renderWeekly();
    };

    metaRow.append(dot, title, badges, removeBtn);
    section.appendChild(metaRow);

    const historyRow = document.createElement('div');
    historyRow.className = 'history-row';
    (habit.weeks || []).forEach(w => historyRow.appendChild(makeWeekSquare(habit, w)));
    if (historyRow.children.length > 0) section.appendChild(historyRow);

    const weekRow = document.createElement('div');
    weekRow.className = 'current-week-row';

    weekDays.forEach((d, i) => {
      const ds = toStr(d);
      const isDone = !!(habit.done && habit.done[ds]);
      const isToday = ds === today;
      const isFuture = ds > today;

      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isDone?' done':'') + (isToday?' today':'') + (isFuture?' future':'');
      if (isDone) cell.style.background = midShade(habit.colorIdx);

      const letter = document.createElement('div');
      letter.className = 'day-letter';
      letter.textContent = DAY_LABELS[i];

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d.getDate();

      cell.append(letter, num);
      if (!isFuture) cell.onclick = () => toggleDay(habit.id, ds, mondayStr);
      weekRow.appendChild(cell);
    });

    const wl = document.createElement('div');
    wl.className = 'week-label';
    wl.textContent = weekLabel(monday);
    weekRow.appendChild(wl);

    section.appendChild(weekRow);
    container.appendChild(section);
  });

  renderCounters();
}

function makeWeekSquare(habit, w) {
  const sq = document.createElement('div');
  sq.className = 'week-square';
  const count = w.count || 0;
  const shade = shadeForCount(habit.colorIdx, count);
  sq.style.background = shade || 'var(--bg3)';
  if (!shade) sq.style.border = '0.5px solid var(--border2)';

  const tip = document.createElement('div');
  tip.className = 'tooltip';
  const mon = strToDate(w.monday);
  tip.textContent = weekLabel(mon) + '  ·  ' + count + '/7';
  sq.appendChild(tip);
  return sq;
}

// ═══════════════════════════════════════════════════════════
//  YEAR VIEW
// ═══════════════════════════════════════════════════════════
function renderYear() {
  document.getElementById('weekly-view').style.display = 'none';
  document.getElementById('year-view').style.display = '';
  document.getElementById('week-nav').style.display = 'none';

  const container = document.getElementById('year-habits');
  container.innerHTML = '';

  const nowMonday = currentWeekMonday();
  const startMonday = addWeeks(nowMonday, -51);
  const weeks = Array.from({length:52}, (_,i) => addWeeks(startMonday, i));

  db.habits.forEach(habit => {
    const section = document.createElement('div');
    section.className = 'year-habit';

    const titleRow = document.createElement('div');
    titleRow.className = 'year-habit-title';
    const dot = document.createElement('div');
    dot.className = 'habit-dot';
    dot.style.background = midShade(habit.colorIdx);
    const streak = calcStreak(habit);
    titleRow.append(dot);
    titleRow.appendChild(document.createTextNode(habit.name));
    if (streak > 0) {
      const sb = document.createElement('span');
      sb.className = 'badge streak';
      sb.style.fontSize = '9px';
      sb.textContent = streak + 'w streak';
      titleRow.appendChild(sb);
    }
    section.appendChild(titleRow);

    const grid = document.createElement('div');
    grid.className = 'year-grid';

    weeks.forEach(monday => {
      const ms = toStr(monday);
      const isCurrentWeek = ms === toStr(nowMonday);
      const isFuture = monday > nowMonday;

      const archived = (habit.weeks || []).find(w => w.monday === ms);
      let count = 0;
      if (isCurrentWeek) {
        const days = getWeekDays(monday);
        count = days.filter(d => habit.done && habit.done[toStr(d)]).length;
      } else if (archived) {
        count = archived.count;
      }

      const sq = document.createElement('div');
      sq.className = 'year-sq' + (isCurrentWeek?' current-week':'') + (isFuture?' future-week':'');

      if (isFuture) {
        sq.style.background = 'var(--bg3)';
        sq.style.border = '0.5px solid var(--border)';
      } else if (count > 0) {
        sq.style.background = shadeForCount(habit.colorIdx, count);
      } else {
        sq.style.background = 'var(--bg3)';
        sq.style.border = '0.5px solid var(--border2)';
      }

      const tip = document.createElement('div');
      tip.className = 'tooltip';
      tip.textContent = weekLabel(monday) + '  ·  ' + (isFuture ? '–' : count+'/7') + (isCurrentWeek?' (now)':'');
      sq.appendChild(tip);

      if (!isFuture) {
        sq.style.cursor = 'pointer';
        sq.onclick = () => { viewingMonday = monday; switchView('weekly'); };
      }

      grid.appendChild(sq);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });

  renderCounters();
}

// ═══════════════════════════════════════════════════════════
//  TOGGLE DAY
// ═══════════════════════════════════════════════════════════
function toggleDay(id, ds, mondayStr) {
  const habit = db.habits.find(h => h.id === id);
  if (!habit) return;
  if (!habit.done) habit.done = {};
  habit.done[ds] = !habit.done[ds];

  const monday = strToDate(mondayStr);
  const weekDays = getWeekDays(monday);
  const doneCount = weekDays.filter(d => habit.done[toStr(d)]).length;

  const isCurrentWeek = mondayStr === toStr(currentWeekMonday());

  if (doneCount === 7 && isCurrentWeek) {
    saveData();
    collapseWeek(id, mondayStr, doneCount);
    return;
  }

  saveData();
  renderWeekly();
}

function collapseWeek(habitId, mondayStr, count) {
  const habit = db.habits.find(h => h.id === habitId);
  if (!habit) return;

  const section = document.getElementById('habit-' + habitId);
  if (!section) return;
  const weekRow = section.querySelector('.current-week-row');
  if (!weekRow) return;

  const cells = weekRow.querySelectorAll('.day-cell');
  cells.forEach((c, i) => {
    c.style.transition = `transform 0.2s ${i*0.04}s, opacity 0.25s ${i*0.04}s`;
    c.style.transform = 'scale(0.5)';
    c.style.opacity = '0';
  });

  setTimeout(() => {
    weekRow.classList.add('collapsing');
    if (!habit.weeks) habit.weeks = [];
    if (!habit.weeks.find(w => w.monday === mondayStr)) {
      habit.weeks.push({ monday: mondayStr, count });
    }
    const monday = strToDate(mondayStr);
    getWeekDays(monday).forEach(d => { delete habit.done[toStr(d)]; });
    saveData();

    setTimeout(() => {
      renderWeekly();
      requestAnimationFrame(() => {
        const newSection = document.getElementById('habit-' + habitId);
        if (!newSection) return;
        const historyRow = newSection.querySelector('.history-row');
        if (!historyRow) return;
        const squares = historyRow.querySelectorAll('.week-square');
        const last = squares[squares.length - 1];
        if (last) last.classList.add('appearing');
      });
    }, 600);
  }, 280);
}

// ═══════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════
function setWeekStart(val) {
  db.settings.weekStart = val;
  saveData();
  document.getElementById('start-mon').classList.toggle('active', val === 'mon');
  document.getElementById('start-sun').classList.toggle('active', val === 'sun');
  if (currentView === 'weekly') renderWeekly();
}

function renderThresholdBtns() {
  const container = document.getElementById('threshold-btns');
  container.innerHTML = '';
  for (let i = 3; i <= 7; i++) {
    const btn = document.createElement('button');
    btn.className = 'seg-btn' + (db.settings.streakThreshold === i ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => {
      db.settings.streakThreshold = i;
      saveData();
      renderThresholdBtns();
      if (currentView === 'weekly') renderWeekly();
    };
    container.appendChild(btn);
  }
}

function renderSettingsPanel() {
  document.getElementById('start-mon').classList.toggle('active', db.settings.weekStart === 'mon');
  document.getElementById('start-sun').classList.toggle('active', db.settings.weekStart === 'sun');
  renderThresholdBtns();
}

// ═══════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'habit-tracker-backup-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.habits) throw new Error('Invalid file');
      if (!confirm('This will replace all current data. Continue?')) return;
      db = imported;
      if (!db.settings) db.settings = { weekStart: 'mon', streakThreshold: 5 };
      if (!db.counters) db.counters = [];
      saveData();
      renderSettingsPanel();
      if (currentView === 'weekly') renderWeekly();
      else renderYear();
    } catch(err) {
      alert('Could not import: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════════════════════
//  VIEW SWITCHER
// ═══════════════════════════════════════════════════════════
function switchView(v) {
  currentView = v;
  document.getElementById('btn-view-weekly').classList.toggle('active', v === 'weekly');
  document.getElementById('btn-view-year').classList.toggle('active', v === 'year');
  if (v === 'weekly') renderWeekly();
  else renderYear();
}

// ═══════════════════════════════════════════════════════════
//  COLOR PICKERS
// ═══════════════════════════════════════════════════════════
function renderColorPicker() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  PALETTE.forEach((p, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === selColor ? ' sel' : '');
    sw.style.background = p.shades[4];
    sw.onclick = () => { selColor = i; renderColorPicker(); };
    row.appendChild(sw);
  });
}

function renderCounterColorPicker() {
  const row = document.getElementById('counter-color-row');
  row.innerHTML = '';
  PALETTE.forEach((p, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === selCounterColor ? ' sel' : '');
    sw.style.background = p.shades[4];
    sw.onclick = () => { selCounterColor = i; renderCounterColorPicker(); };
    row.appendChild(sw);
  });
}

// ═══════════════════════════════════════════════════════════
//  LEGEND
// ═══════════════════════════════════════════════════════════
function renderLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '<span>weekly score</span>';
  for (let i = 1; i <= 7; i++) {
    const sq = document.createElement('div');
    sq.className = 'leg-sq';
    sq.style.background = PALETTE[0].shades[i];
    const num = document.createElement('span');
    num.className = 'leg-num';
    num.textContent = i;
    leg.appendChild(sq);
    leg.appendChild(num);
  }
}

// ═══════════════════════════════════════════════════════════
//  WIRE UP
// ═══════════════════════════════════════════════════════════
document.getElementById('add-btn').onclick = () => {
  const panel = document.getElementById('add-panel');
  const open = panel.style.display === 'block';
  document.getElementById('settings-panel').style.display = 'none';
  document.getElementById('add-counter-panel').style.display = 'none';
  panel.style.display = open ? 'none' : 'block';
  if (!open) { renderColorPicker(); document.getElementById('habit-input').focus(); }
};

document.getElementById('btn-cancel').onclick = () => {
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('habit-input').value = '';
};

document.getElementById('btn-save').onclick = () => {
  const val = document.getElementById('habit-input').value.trim();
  if (!val) return;
  db.habits.push({ id: Date.now(), name: val, colorIdx: selColor, done: {}, weeks: [] });
  saveData();
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('habit-input').value = '';
  if (currentView === 'weekly') renderWeekly();
  else renderYear();
};

document.getElementById('habit-input').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('btn-save').click();
  if (e.key === 'Escape') document.getElementById('btn-cancel').click();
};

document.getElementById('btn-settings').onclick = () => {
  const panel = document.getElementById('settings-panel');
  const open = panel.style.display === 'block';
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('add-counter-panel').style.display = 'none';
  panel.style.display = open ? 'none' : 'block';
  if (!open) renderSettingsPanel();
};

document.getElementById('btn-view-weekly').onclick = () => switchView('weekly');
document.getElementById('btn-view-year').onclick = () => switchView('year');

document.getElementById('prev-week').onclick = () => {
  const base = viewingMonday || currentWeekMonday();
  viewingMonday = addWeeks(base, -1);
  renderWeekly();
};

document.getElementById('next-week').onclick = () => {
  const base = viewingMonday || currentWeekMonday();
  const next = addWeeks(base, 1);
  const now = currentWeekMonday();
  if (next <= now) { viewingMonday = next; renderWeekly(); }
};

document.getElementById('today-btn').onclick = () => {
  viewingMonday = null;
  renderWeekly();
};

// Counter add panel
document.getElementById('add-counter-btn').onclick = () => {
  const panel = document.getElementById('add-counter-panel');
  const open = panel.style.display === 'block';
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('settings-panel').style.display = 'none';
  panel.style.display = open ? 'none' : 'block';
  if (!open) { renderCounterColorPicker(); document.getElementById('counter-input').focus(); }
};

document.getElementById('btn-counter-cancel').onclick = () => {
  document.getElementById('add-counter-panel').style.display = 'none';
  document.getElementById('counter-input').value = '';
};

document.getElementById('btn-counter-save').onclick = () => {
  const val = document.getElementById('counter-input').value.trim();
  if (!val) return;
  db.counters.push({ id: Date.now(), name: val, colorIdx: selCounterColor, days: {}, months: {}, view: 'daily' });
  saveData();
  document.getElementById('add-counter-panel').style.display = 'none';
  document.getElementById('counter-input').value = '';
  renderCounters();
};

document.getElementById('counter-input').onkeydown = e => {
  if (e.key === 'Enter') document.getElementById('btn-counter-save').click();
  if (e.key === 'Escape') document.getElementById('btn-counter-cancel').click();
};

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderLegend();
switchView('weekly');
</script>
